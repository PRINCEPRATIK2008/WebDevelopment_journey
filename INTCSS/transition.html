<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <style>
        .container {
            background-color: beige;
        }

        .box {
            height: 45px;
            width: 45px;
            margin: 3px;
            background-color: rgb(233, 123, 79);
            /* transition: width 0.3s ease 3s; */
            animation: prince 2.5s ease 0.3s 3 normal;
        }

        @keyframes prince {
            from {
                width: 45px;
            }

            to {
                width: 45vw;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Box1</div>
        <div class="box">Box2</div>
        <div class="box">Box3</div>
        <div class="box">Box4</div>
        <div class="box">Box5</div>
    </div>
</body>

</html>

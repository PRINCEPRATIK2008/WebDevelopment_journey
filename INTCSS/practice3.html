<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Practice</title>
    <style>
        .container {
            display: flex;
            height: 100vh;
            justify-content: space-between;
            align-items: flex-start;
            border: 2px solid black;
            border-radius: 43px;
        }

        .box {
            display: flex;
            border: 2px solid rgb(3, 56, 16);
            width: 100px;
            height: 100px;
            margin: 10px;
            border-radius: 20px;
            background-color: rgb(41, 78, 78);
            justify-content: center;
            align-items: center;
            color: whitesmoke;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>

</html>

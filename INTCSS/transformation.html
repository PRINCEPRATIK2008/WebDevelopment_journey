<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformations</title>
    <style>
         .container{
            background-color: beige;
            height: 70vh;
            width: 450px;
         } 
.box{
    width: 123px;
    height: 123px;
    background-color: rgb(82, 121, 128);
    margin: 5px;
    transform: translate(154px , 244px) rotate(45deg) scale(1.85); 
    /* scale ko scaleX and scaleY or scale( , ) krke bhi kr skte hai  */
    /* transform: skew(20deg , 10deg); */
}
    </style>
</head>
<body>
   <div class="container">
    <div class="box">
        Box 1
    </div>
   </div> 
</body>
</html>

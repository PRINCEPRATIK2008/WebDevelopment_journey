<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Oswald:wght@200..700&family=Playwrite+GB+J+Guides:ital@0;1&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&display=swap"
        rel="stylesheet">
    <style>
        p {
            font-size: 21px;
            font-family: "Oswald", sans-serif;
            font-weight: 400;
            text-align: justify;
            font-optical-sizing: auto;
            line-height: 1.56;
            letter-spacing: 2px;
        }

        h1 {
            font-family: "Oswald", sans-serif;
            font-weight: weight;
            text-align: center;
            text-decoration: underline;
        }

        .capital {
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <h1 class="capital">Typography</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequuntur commodi dolorum blanditiis magni deserunt
        in! Esse neque impedit dignissimos, error voluptatibus, cupiditate inventore cumque, quis architecto qui minima.
        Fuga sit accusantium error autem accusamus.</p>
</body>

</html>

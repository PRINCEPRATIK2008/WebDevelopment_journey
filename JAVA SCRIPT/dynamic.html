<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube card</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
        }


        .container {
            width: 950px;
            height: auto;
            background-color: #000000;
            border: 3px solid rgb(211, 243, 3);
            border-radius: 20px;
            padding: 15px;
            
        }


        .video-card {
            display: flex;
            margin: 35px;
            color: white;
            gap: 25px;
        }

        .thumbbox1 {
            height: 120px;
            width: 170px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .thumbbox1 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            right: 8px;
            bottom: 8px;
            background-color: black;
            color: white;
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 12px;
        }

        .video-info h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
        }

        .video-info p {
            margin: 5px 0;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container"></div>

    <script src="dynamic.js"></script>
</body>

</html>

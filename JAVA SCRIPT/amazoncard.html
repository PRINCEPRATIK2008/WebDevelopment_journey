<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon-Card</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            margin: 20px;
        }

        .h1 {
            text-align: center;
            font-size: 55px;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
        }

        .product-card {
            display: flex;
            gap: 20px;
            width: 850px;
            padding: 18px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .15);
        }

        .thumbnail {
            width: 260px;
            height: 220px;
            overflow: hidden;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-infooo {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .card-infooo h3 {
            margin: 0;
            font-size: 26px;
        }

        .card-infooo span {
            font-size: 18px;
        }

        .card-infooo div {
            font-size: 30px;
            font-weight: bold;
            color: #B12704;
        }

        .cart-btn {
            width: 170px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #f1d85e;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            transition: .3s;
        }

        .cart-btn:hover {
            background: #786825;
        }
    </style>
</head>

<body>
    <h3 class="h1">GAMERS CHOICE MONITOR</h3>
    <div class="container"></div>
    <script src="amazoncard.js"></script>
</body>

</html>
